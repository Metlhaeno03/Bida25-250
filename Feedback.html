<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
  <link rel="stylesheet" href="style.css">
</head>
<<body class="bg-feedback">
  <header>
     <div class="logo">
    <img src="Logo.png" alt="Savanna Eats Logo">
  </div>
   
  <button class="hamburger" id="hamburger-btn">
      ☰ </button>
      
  <nav class="main-nav">
  <a href="index.html" class="nav-box">Home</a>
  <a href="about.html" class="nav-box">About</a>
  <a href="Food spots directory.html" class="nav-box">Directory</a>

</nav>
  </header>

  <section class="feedback">
    <h1>We Value Your Feedback!</h1>
    <form>
     <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label for="rating">Rating</label>
    <select id="rating">
      <option value="">Select rating</option>
      <option value="5">Excellent (5)</option>
      <option value="4">Good (4)</option>
      <option value="3">Average (3)</option>
      <option value="2">Poor (2)</option>
      <option value="1">Very Poor (1)</option>
    </select>

    <label for="comment">Comment</label>
    <textarea id="comment" rows="4" placeholder="Write your comment..."></textarea>

    <button type="submit">Submit</button>
  </form>

  <div class="success-message" id="successMessage">
    ✅ Thank you for your feedback!
  </div>

  <script>
    // Show success message on submit
    const form = document.getElementById('feedbackForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', function(event) {
      event.preventDefault(); // prevent actual submission
      successMessage.style.display = 'block';
      form.reset(); // clear form fields
    });
  </script>
      
    </form>
  </section>

  <footer>
     <p>Contact Info | Social Media | © 2026 Savanna Eats</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>

</body>
