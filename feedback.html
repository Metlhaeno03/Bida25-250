    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-overlay">
        
        <header>
           <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-75" aria-label="Main navigation">
                <div class="container-fluid px-4"> 
            
                    <a class="navbar-brand" href="index.html" aria-label="Savanna Eats Home">
                        <img src="logo.png" alt="Savanna Eats Logo" style="width: 140px; height: auto; max-width: 100%;">
                    </a>
            
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                   <ul class="navbar-nav">
                     <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                     <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>

                   </ul>
                </div>
            
              </div>
           </nav>
        </header>

        <main class="container my-5 d-flex justify-content-center" style="flex: 1;">
            <div class="col-md-8 bg-dark bg-opacity-75 p-5 rounded text-white">
                <h1 class="text-center mb-4">We Value Your Feedback!</h1>
                <form id="feedbackForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="rating" class="form-label">Rating</label>
                        <select class="form-select" id="rating">
                            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                            <option value="4">⭐⭐⭐⭐ Good</option>
                            <option value="3">⭐⭐⭐ Average</option>
                            <option value="2">⭐⭐ Poor</option>
                            <option value="1">⭐ Terrible</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label for="comment" class="form-label">Comment</label>
                        <textarea class="form-control" id="comment" rows="4" placeholder="Tell us about your experience..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fs-5">Submit Feedback</button>
                </form>
            </div>
        </main>

        <footer class="text-white text-center py-4 mt-auto bg-dark">
            <div class="container">
                <p class="mb-1">Contact Info: hello@savannaeats.co.bw | +267 78757861</p>

                    <a href="#" class="text-white text-decoration-none" aria-label="Twitter">Twitter</a>
                </p>
                <small>&copy; 2026 Savanna Eats. All rights reserved.</small>
            </div>
        </footer>

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
