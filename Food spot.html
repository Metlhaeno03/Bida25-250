<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Spot | Savanna Eats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="Logo.png" alt="Savanna Eats Logo">
    </div> 

    <nav class="main-nav">
      <a href="index.html" class="nav-box">Home</a>
      <a href="about.html" class="nav-box">About</a>
      <a href="Food spots directory.html" class="nav-box">Directory</a>
      <a href="Food spot.html" class="nav-box">Spots</a>
      <a href="Map.html" class="nav-box">Map</a>
      <a href="Feedback.html" class="nav-box">Feedback</a>
    </nav>
  </header>

<section class="foodspot-page">
  <div class="foodspot-container">

    <div class="foodspot-left">
      <div class="photos">
        <h3>Food Photos</h3>
        <div class="photo-gallery" id="spot-photos">
          </div>
      </div>

      <div class="menu">
        <h3>Menu Items</h3>
        <ul class="menu-list" id="spot-menu">
           </ul>
      </div>
    </div>

    <div class="foodspot-right">
      <h2 class="spot-name" id="spot-title">Loading...</h2>
      <p class="address"><strong>Address:</strong> <span id="spot-address"></span></p>
      <p class="hours"><strong>Opening Hours:</strong> <span id="spot-hours"></span></p>
      <p class="reviews"><strong>Reviews:</strong> <span id="spot-reviews"></span></p>

      <div class="description-section">
        <h3>Description</h3>
        <p id="spot-desc">
          </p>
      </div>

      <button class="btn-visit">Visit Location</button>

    </div>
  </div>
</section>

  <footer>
     <p>Contact Info | Social Media | © 2026 Savanna Eats</p>
  </footer>
  
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script> 
  <script src="script.js"></script>
</body>
</html>
