<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map | Savanna Eats</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="Logo.png" alt="Savanna Eats Logo">
    </div>
  <nav class="main-nav">
  <a href="index.html" class="nav-box">Home</a>
  <a href="about.html" class="nav-box">About</a>
  <a href="Food spots directory.html" class="nav-box">Directory</a>

  <a href="Map.html" class="nav-box">Map</a>
  <a href="Feedback.html" class="nav-box">Feedback</a>
</nav>
  </header>

  <section class="map-page container mt-4"> <h1>Find Food Spots Near You</h1>
    
    <div class="search-bar mb-4">
  <input type="text" id="locationInput" placeholder="Enter location..." class="form-control d-inline w-auto">
  
  <button id="searchBtn" class="btn btn-primary">Search</button>
    </div>
    
    <div class="map-area mb-4">
      <div id="map"></div> 
    </div>
    
    <section class="featured-spots">
  <h2>Featured Food Spots</h2>
  <div class="spots-container">

    <div class="spot-card">
      <img src="images/spot1.jpg" alt="Food Spot 1">
      <div class="spot-info">
        <span class="spot-label">Food Spot 1</span>
        <h3 class="spot-name">Spot Name 1</h3>
        <button class="btn-view">View on Map</button>
      </div>
    </div>

    <div class="spot-card">
      <img src="images/spot2.jpg" alt="Food Spot 2">
      <div class="spot-info">
        <span class="spot-label">Food Spot 2</span>
        <h3 class="spot-name">Spot Name 2</h3>
        <button class="btn-view">View on Map</button>
      </div>
    </div>

    <div class="spot-card">
      <img src="images/spot3.jpg" alt="Food Spot 3">
      <div class="spot-info">
        <span class="spot-label">Food Spot 3</span>
        <h3 class="spot-name">Spot Name 3</h3>
        <button class="btn-view">View on Map</button>
      </div>
    </div>

  </div>
</section>


  <footer class="mt-5 text-center">

</html>
