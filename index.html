<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savanna Eats | Homepage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->

  <header>
    <div class="logo">
       <img src="Logo.png" alt="Savanna Eats Logo" style="height:40px;">
    </div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Food Spots</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Feedback</a></li>
      </ul>
    </nav>
  </header>

  <!-- Banner Section -->
  <section class="banner">
    <h1>Find the Best Food Spots Near You!</h1>
    <div class="search-bar">
      <input type="text" placeholder="Enter location or type...">
      <button>Search</button>
    </div>
    <p class="tagline">Discover Flavor, Discover Home.</p>
  </section>

  <!-- Featured Food Spots -->
  <section class="featured">
    <h2>Featured Food Spots</h2>
    <div class="cards">
      <div class="card">
        <img src="spot1.jpg" alt="Food Spot 1">
        <h3>Spot Name 1</h3>
        <button>View More</button>
      </div>
      <div class="card">
        <img src="spot2.jpg" alt="Food Spot 2">
        <h3>Spot Name 2</h3>
        <button>View More</button>
      </div>
      <div class="card">
        <img src="spot3.jpg" alt="Food Spot 3">
        <h3>Spot Name 3</h3>
        <button>View More</button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>Contact Info | Social Media | © 2026 Savanna Eats</p>
  </footer>
</body>
</html>
